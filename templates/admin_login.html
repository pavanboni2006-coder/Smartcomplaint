{% extends "base.html" %}
{% block title %}Admin Login - Smart Complaint System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card admin-card">
        <div class="auth-header">
            <div class="auth-icon">🛡️</div>
            <h2>Admin Portal</h2>
            <p>Restricted access — Admins only</p>
        </div>

        <!-- Admin Login Form -->
        <form action="{{ url_for('admin_login') }}" method="POST" class="auth-form">

            <!-- Username -->
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter admin username"
                    required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn btn-danger btn-block">Admin Login</button>
        </form>

        <div class="auth-footer">

            <p><a href="{{ url_for('login') }}">← User Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
