{% extends "base.html" %}
{% block title %}Register - Smart Complaint System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">👤</div>
            <h2>Create Account</h2>
            <p>Join to start submitting complaints</p>
        </div>

        <!-- Registration Form -->
        <form action="{{ url_for('register') }}" method="POST" class="auth-form" id="registerForm">

            <!-- Full Name -->
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name"
                    required minlength="2" maxlength="100">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email"
                    required>
            </div>

            <!-- Phone (optional) -->
            <div class="form-group">
                <label for="phone">Phone Number <span class="optional">(optional)</span></label>
                <input type="tel" id="phone" name="phone" class="form-control" placeholder="Enter phone number"
                    maxlength="15">
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Minimum 6 characters" required minlength="6">
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm_password">Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                    placeholder="Re-enter your password" required>
                <!-- Error shown by JS if passwords don't match -->
                <small id="pw-error" class="text-danger" style="display:none;">Passwords do not match!</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
