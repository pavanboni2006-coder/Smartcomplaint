{% extends "base.html" %}
{% block title %}Login - Smart Complaint System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h2>Welcome Back</h2>
            <p>Login to manage your complaints</p>
        </div>

        <!-- Login Form -->
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email"
                    required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="auth-footer">
            <p>New user? <a href="{{ url_for('register') }}">Register here</a></p>
            <p><a href="{{ url_for('admin_login') }}">Admin Login →</a></p>
        </div>
    </div>
</div>
{% endblock %}
